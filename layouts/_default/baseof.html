<!DOCTYPE html>
<html lang="de">
<head>{{ partial "head.html" . }}</head>
<body>
<header class="site-header">
  <div class="wrap">
    <a class="brand" href="{{ "/" | relURL }}"><img class="brand-logo" src="{{ "logo-icon.svg" | relURL }}" alt="" width="34" height="34">Tool<span>Fuchs</span></a>
    <nav>{{ range .Site.Menus.main }}<a href="{{ .URL | relURL }}">{{ .Name }}</a>{{ end }}</nav>
  </div>
</header>
<main class="wrap">{{ block "main" . }}{{ end }}</main>
<footer class="site-footer">
  <div class="wrap">
    <p>© {{ now.Year }} {{ .Site.Title }} · <a href="{{ "/impressum/" | relURL }}">Impressum</a> · <a href="{{ "/datenschutz/" | relURL }}">Datenschutz</a></p>
    <p class="muted">Enthält Affiliate-Links (Werbung). Empfehlungen basieren auf eigener Prüfung.</p>
  </div>
</footer>
</body>
</html>
